<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Joe's game library</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f5f5;
    }

    header {
        background: #e60012;
        color: white;
        padding: 20px;
        font-size: 32px;
        font-weight: bold;
        text-align: center;
    }

    #controls {
        display: flex;
        gap: 20px;
        padding: 15px;
        background: white;
        border-bottom: 1px solid #ddd;
    }

    .groupHeader {
        font-size: 24px;
        margin: 20px 10px 10px;
        color: #333;
    }

    .groupGrid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        padding: 10px 20px 30px;
    }

    #gameGrid {
        display: block;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .borrowedOverlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.65);
        color: white;
        font-weight: bold;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        pointer-events: none; /* click still opens modal */
    }

    .gameCard {
        position: relative; /* required so overlay positions correctly */
        background: white;
        border-radius: 8px;
        padding: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        cursor: pointer;
        transition: transform 0.1s;
    }

    .gameCard:hover {
        transform: scale(1.03);
    }

    .gameCard img {
        width: 100%;
        border-radius: 6px;
    }

    .gameCard .title {
        margin-top: 8px;
        font-weight: bold;
        text-align: center;
    }

    /* Modal */
    #modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: none;
        align-items: center;
        justify-content: center;
    }

    #modalContent {
        background: white;
        padding: 20px;
        max-width: 600px;
        max-height: 90vh;     /* modal never exceeds screen height */
        overflow-y: auto;     /* scroll inside modal if needed */
        border-radius: 10px;
    }

    #modalContent img {
        width: 100%;
        max-height: 40vh;     /* prevents portrait images from being too tall */
        object-fit: contain;  /* keeps aspect ratio */
        border-radius: 8px;
    }

    #closeModal {
        float: right;
        cursor: pointer;
        font-size: 20px;
        font-weight: bold;
    }

@media (max-width: 600px) {
    #modalContent {
        width: 90%;
        padding: 15px;
    }

    #gameGrid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    }

    header {
        font-size: 24px;
        padding: 15px;
    }

    #closeModal {
        position: sticky;
        top: 0;
        background: white;
        padding: 5px;
    }

    .groupGrid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    }
}
</style>
</head>
<body>

<header>Joe's game library</header>

<div id="controls">
    <input id="searchBox" type="text" placeholder="Search games…">
    <select id="sortSelect">
        <option value="name">Sort by name</option>
        <option value="year">Sort by year</option>
        <option value="category">Sort by category</option>
    </select>
</div>

<div id="gameGrid"></div>

<!-- Modal -->
<div id="modal">
    <div id="modalContent">
        <span id="closeModal">✖</span>
        <h2 id="modalTitle"></h2>
        <img id="modalImage">
        <p id="modalDesc"></p>
    </div>
</div>

<script>
async function loadGames() {
    const response = await fetch("games.json");
    const games = await response.json();
    return games;
}

function renderGames(games, groupBy = null) {
    const grid = document.getElementById("gameGrid");
    grid.innerHTML = "";

    if (!groupBy) {
        // Flat list
        const flatGrid = document.createElement("div");
        flatGrid.className = "groupGrid";
        games.forEach(game => flatGrid.appendChild(createGameCard(game)));
        grid.appendChild(flatGrid);
        return;
    }

    // Grouping
    const groups = {};
    games.forEach(game => {
        const key = game[groupBy];
        if (!groups[key]) groups[key] = [];
        groups[key].push(game);
    });

    Object.keys(groups).sort().forEach(groupName => {
        // Header
        const header = document.createElement("h2");
        header.textContent = groupName;
        header.className = "groupHeader";
        grid.appendChild(header);

        // Grid for this group
        const groupContainer = document.createElement("div");
        groupContainer.className = "groupGrid";

        groups[groupName].forEach(game => {
            groupContainer.appendChild(createGameCard(game));
        });

        grid.appendChild(groupContainer);
    });
}

function createGameCard(game) {
    const card = document.createElement("div");
    card.className = "gameCard";

    card.innerHTML = `
        <img src="${game.image}" loading="lazy">
        <div class="title">${game.name}</div>
    `;

    if (game.borrowed) {
        const overlay = document.createElement("div");
        overlay.className = "borrowedOverlay";
        overlay.textContent = "BORROWED";
        card.appendChild(overlay);
    }

    card.onclick = () => openModal(game);
    return card;
}

function openModal(game) {
    document.getElementById("modalTitle").textContent = game.name;
    document.getElementById("modalImage").src = game.image;
    document.getElementById("modalDesc").textContent = game.description;
    document.getElementById("modal").style.display = "flex";
}

document.getElementById("closeModal").onclick = () =>
    document.getElementById("modal").style.display = "none";

function applyFilters(games) {
    const search = document.getElementById("searchBox").value.toLowerCase();
    const sort = document.getElementById("sortSelect").value;

    let filtered = games.filter(g =>
        g.name.toLowerCase().includes(search)
    );

    filtered.sort((a, b) => {
        if (sort === "name") return a.name.localeCompare(b.name);
        if (sort === "year") return a.year - b.year;
        if (sort === "category") return a.category.localeCompare(b.category);
    });

    const groupBy = (sort === "year" || sort === "category") ? sort : null;

    renderGames(filtered, groupBy);
}

(async () => {
    const games = await loadGames();

    document.getElementById("searchBox").oninput = () => applyFilters(games);
    document.getElementById("sortSelect").onchange = () => applyFilters(games);

    applyFilters(games);
})();

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        document.getElementById("modal").style.display = "none";
    }
});

document.getElementById("modal").onclick = (e) => {
    if (e.target === document.getElementById("modal")) {
        document.getElementById("modal").style.display = "none";
    }
};
</script>

</body>
</html>
