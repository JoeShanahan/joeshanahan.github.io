<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1">
<title>Joe's Game Library</title>
<style>
    body {
        font-family: Helvetica, sans-serif;
        margin: 0;
        background: #f5f5f5;
    }

    header {
        background: #e60012;
        color: white;
        padding: 20px;
        font-size: 32px;
        font-weight: bold;
        text-align: left;
        font-family: "Segoe UI", sans-serif;
    }

    #controls {
        display: flex;
        gap: 20px;
        padding: 15px;
        background: white;
        border-bottom: 1px solid #ddd;
    }

    .groupHeader {
        font-size: 24px;
        margin: 20px 10px 10px;
        color: #333;
    }

    .groupGrid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        padding: 10px 20px 30px;
    }

    #gameGrid {
        display: block;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .borrowedOverlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.65);
        color: white;
        font-weight: bold;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        pointer-events: none; /* click still opens modal */
    }

    .gameCard {
        position: relative; /* required so overlay positions correctly */
        background: white;
        border-radius: 8px;
        padding: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        cursor: pointer;
        transition: transform 0.1s;
    }

    .gameCard:hover {
        transform: scale(1.03);
    }

    .gameCard img {
        width: 100%;
        border-radius: 6px;
    }

    .gameCard .title {
        margin-top: 8px;
        font-weight: bold;
        text-align: center;
    }

    /* Modal */
    #modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.85); /* more opaque */
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    /* No white box — content floats */
    #modalContent {
        display: flex;
        gap: 20px;
        color: white;
        max-width: 900px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
    }

    #modalContent img {
        width: 100%;
        max-height: 60vh;     /* prevents portrait images from being too tall */
        object-fit: contain;  /* keeps aspect ratio */
        border-radius: 8px;
    }

    /* Box art */
    #modalImage {
        width: 40%;
        max-width: 300px;
        border-radius: 8px;
        object-fit: contain;
    }

    /* Text column */
    #modalText {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    /* Title */
    #modalTitle {
        font-size: 28px;
        font-weight: bold;
        margin: 0;
    }

    /* Description */
    #modalDesc {
        color: #d0d0d0; /* light grey */
        line-height: 1.5;
    }

    /* Labels */
    .modalLabel {
        font-weight: bold;
        margin-top: 10px;
        color: #ffffff;
    }

    .modalValue {
        color: #cccccc;
    }

    /* Close button */
    #closeModal {
        position: absolute;
        top: 0;
        right: 0;
        font-size: 28px;
        font-weight: bold;
        color:white;
        cursor: pointer;
        padding: 32px;
        z-index: 100000;
    }

    #modalMeta {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
        width: 100%;
    }

    .metaItem {
        flex: 1;
        text-align: center;
    }

    .metaLabel {
        font-weight: bold;
        color: white;
        margin-bottom: 4px;
    }

    .metaValue {
        color: #cccccc;
    }


@media (max-width: 900px) {
    #modalContent {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    #gameGrid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    }

    header {
        font-size: 24px;
        padding: 15px;
    }

    .groupGrid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    }

    #modalContent img {
        max-height: 50vh;
    }

    #modalImage {
        width: 80%;
        max-width: none;
    }

    #modalText {
        width: 100%;
    }

    #closeModal {
        top: 5px;
        right: 5px;
    }
}
</style>
</head>
<body>

<header>Joe's Game Library</header>

<div id="controls">
    <input id="searchBox" type="text" placeholder="Search games…">
    <select id="sortSelect">
        <option value="name">Sort by name</option>
        <option value="year">Sort by year</option>
        <option value="category">Sort by category</option>
    </select>
</div>

<div id="gameGrid"></div>

<!-- Modal -->
<div id="modal">
    <span id="closeModal">✖</span>

    <div id="modalContent">
        <img id="modalImage">

        <div id="modalText">
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>

           <div id="modalMeta">
            <div class="metaItem">
                <div class="metaLabel">Release year</div>
                <div class="metaValue" id="modalYear"></div>
            </div>

            <div class="metaItem">
                <div class="metaLabel">Category</div>
                <div class="metaValue" id="modalCategory"></div>
            </div>

            <div class="metaItem">
                <div class="metaLabel">Available</div>
                <div class="metaValue" id="modalAvailable"></div>
            </div>
        </div>
    </div>
</div>

<script>
async function loadGames() {
    const response = await fetch("games.json");
    const games = await response.json();
    return games;
}

function renderGames(games, groupBy = null) {
    const grid = document.getElementById("gameGrid");
    grid.innerHTML = "";

    if (!groupBy) {
        // Flat list
        const flatGrid = document.createElement("div");
        flatGrid.className = "groupGrid";
        games.forEach(game => flatGrid.appendChild(createGameCard(game)));
        grid.appendChild(flatGrid);
        return;
    }

    // Grouping
    const groups = {};
    games.forEach(game => {
        const key = game[groupBy];
        if (!groups[key]) groups[key] = [];
        groups[key].push(game);
    });

    Object.keys(groups).sort().forEach(groupName => {
        // Header
        const header = document.createElement("h2");
        header.textContent = groupName;
        header.className = "groupHeader";
        grid.appendChild(header);

        // Grid for this group
        const groupContainer = document.createElement("div");
        groupContainer.className = "groupGrid";

        groups[groupName].forEach(game => {
            groupContainer.appendChild(createGameCard(game));
        });

        grid.appendChild(groupContainer);
    });
}

function createGameCard(game) {
    const card = document.createElement("div");
    card.className = "gameCard";

    card.innerHTML = `
        <img src="${game.image}" loading="lazy">
        <div class="title">${game.name}</div>
    `;

    if (game.borrowed) {
        const overlay = document.createElement("div");
        overlay.className = "borrowedOverlay";
        overlay.textContent = "BORROWED";
        card.appendChild(overlay);
    }

    card.onclick = () => openModal(game);
    return card;
}

function openModal(game) {
    document.getElementById("modalTitle").textContent = game.name;
    document.getElementById("modalImage").src = game.image;
    document.getElementById("modalDesc").textContent = game.description || "";
    document.getElementById("modalYear").textContent = game.year || "Unknown";
    document.getElementById("modalCategory").textContent = game.category || "Unknown";

    document.getElementById("modalAvailable").textContent =
        game.borrowed ? "No" : "Yes";

    document.getElementById("modal").style.display = "flex";
}

document.getElementById("closeModal").onclick = () =>
    document.getElementById("modal").style.display = "none";

function applyFilters(games) {
    const search = document.getElementById("searchBox").value.toLowerCase();
    const sort = document.getElementById("sortSelect").value;

    let filtered = games.filter(g =>
        g.name.toLowerCase().includes(search)
    );

    filtered.sort((a, b) => {
        if (sort === "name") return a.name.localeCompare(b.name);
        if (sort === "year") return a.year - b.year;
        if (sort === "category") return a.category.localeCompare(b.category);
    });

    const groupBy = (sort === "year" || sort === "category") ? sort : null;

    renderGames(filtered, groupBy);
}

(async () => {
    const games = await loadGames();

    document.getElementById("searchBox").oninput = () => applyFilters(games);
    document.getElementById("sortSelect").onchange = () => applyFilters(games);

    applyFilters(games);
})();

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        document.getElementById("modal").style.display = "none";
    }
});

document.getElementById("modal").onclick = (e) => {
    if (e.target === document.getElementById("modal")) {
        document.getElementById("modal").style.display = "none";
    }
};
</script>

</body>
</html>
